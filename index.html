<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTRIET STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@400;600;800&display=swap');
        .font-hacker { font-family: 'Fira Code', monospace; }
        .font-luxury { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        .glitch-text { text-shadow: 2px 0 red, -2px 0 blue; }
        .smooth-transition { transition: all 0.4s ease-in-out; }
        .toggle-checkbox:checked { right: 0; border-color: #68D391; }
        .toggle-checkbox:checked + .toggle-label { background-color: #68D391; }
    </style>
</head>
<body id="main-body" class="flex flex-col items-center justify-center min-h-screen p-2 md:p-4 bg-black text-[#00ff41] font-hacker smooth-transition">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-sm smooth-transition p-4">
        <div class="bg-[#0a0a0a] border border-red-900 p-6 md:p-8 rounded-xl text-center shadow-[0_0_30px_rgba(255,0,0,0.3)] max-w-sm w-full transition-all duration-300" id="login-box">
            <h2 class="text-2xl font-bold text-red-600 mb-2 glitch-text uppercase">MTRIET STORE</h2>
            
            <div id="step-name">
                <div class="bg-red-950/40 border border-red-800 p-3 rounded-lg text-left mb-6 shadow-inner">
                    <p class="font-bold text-red-500 text-xs mb-2">⚠️ NỘI QUY LÃNH ĐỊA:</p>
                    <ul class="list-disc pl-4 space-y-1 text-[10px] md:text-xs text-red-300">
                        <li>Hệ thống AI chuyên dùng để chửi lộn xả stress.</li>
                        <li>Đã tích hợp Voice AI the thé cực kỳ chói tai.</li>
                    </ul>
                </div>
                <input type="text" id="loginName" placeholder="Mày tên gì?..." class="w-full bg-black border border-red-900 p-4 rounded-lg text-white mb-4 outline-none focus:border-red-500 text-center font-bold transition-colors">
                <button onclick="nextStepLogin()" class="w-full bg-red-800 hover:bg-red-600 text-black font-bold py-4 rounded-lg transition-colors shadow-[0_0_15px_rgba(255,0,0,0.4)]">TIẾP TỤC</button>
            </div>

            <div id="step-key" class="hidden">
                <p class="text-sm text-red-400 mb-2 font-bold animate-pulse">KHO VŨ KHÍ API</p>
                <p class="text-[10px] text-gray-400 mb-4">Dán danh sách Key vào đây (tự động loại bỏ Key chết)</p>
                <textarea id="initialApiKeys" rows="4" placeholder="AIzaSy...&#10;AIzaSy..." class="w-full bg-black border border-red-900 p-3 rounded-lg text-red-500 mb-4 outline-none focus:border-red-500 text-xs transition-colors resize-none font-mono"></textarea>
                <button onclick="enterGate()" class="w-full bg-red-800 hover:bg-red-600 text-black font-bold py-4 rounded-lg transition-colors shadow-[0_0_15px_rgba(255,0,0,0.4)]">TIẾN VÀO LÃNH ĐỊA</button>
                <button onclick="backToName()" class="mt-4 text-[10px] text-gray-500 underline hover:text-red-500 transition-colors">Quay lại đổi tên</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="w-full max-w-2xl flex flex-col h-full justify-between hidden opacity-0 smooth-transition">
        <div class="text-center mb-4 mt-2">
            <h1 id="app-title" class="text-3xl md:text-4xl font-bold text-red-600 tracking-widest glitch-text uppercase smooth-transition">MTRIET STORE</h1>
            <p id="app-subtitle" class="text-[10px] md:text-xs text-gray-500 tracking-[0.2em] uppercase mt-1">SYSTEM: TỤC ĐẠO LÝ - ẢNH CÀ KHỊA</p>
        </div>

        <div id="chat-box" class="h-[55dvh] md:h-[60dvh] overflow-y-auto bg-[#050505] border border-[#330000] shadow-[inset_0_0_20px_rgba(255,0,0,0.1)] rounded-t-xl p-4 md:p-6 space-y-4 smooth-transition"></div>

        <div class="bg-[#050505] border-l border-r border-[#330000] px-4 py-2 flex justify-between items-center shadow-inner">
            <div class="flex items-center gap-2">
                <span class="text-[10px] md:text-xs text-gray-500 font-bold uppercase tracking-wider">Voice AI:</span>
                <div class="relative inline-block w-8 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle" id="voiceToggle" checked class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-4 appearance-none cursor-pointer transition-transform duration-200 ease-in-out"/>
                    <label for="voiceToggle" class="toggle-label block overflow-hidden h-4 rounded-full bg-gray-600 cursor-pointer"></label>
                </div>
            </div>
            <div>
                <span class="text-[10px] md:text-xs text-gray-500 font-bold uppercase tracking-wider">Số Key sống:</span>
                <span class="text-xs md:text-sm font-black text-[#00ff41] transition-colors ml-1" id="keys-count">0</span>
            </div>
        </div>

        <div id="input-area" class="bg-[#050505] p-2 md:p-4 border border-t-0 border-b-0 border-[#330000] flex gap-2 md:gap-3 smooth-transition rounded-b-xl">
            <input type="text" id="userInput" placeholder="Gõ để rước hoạ..." class="flex-1 bg-black border border-[#330000] p-3 md:p-4 rounded-lg text-white text-sm md:text-base outline-none focus:border-red-600 disabled:opacity-50 transition-all">
            <button onclick="handleSend()" id="sendBtn" class="bg-red-800 hover:bg-red-600 text-black px-4 py-3 md:px-8 md:py-4 rounded-lg font-bold transition-all active:scale-95 disabled:opacity-50 whitespace-nowrap">GÁY</button>
        </div>
        
        <div class="text-center mt-3 mb-2 flex justify-center gap-6">
            <button onclick="clearHistory()" class="text-[10px] md:text-xs text-gray-600 hover:text-red-500 underline transition-colors">Xóa phiên làm việc & Đổi Key</button>
        </div>
    </div>

    <script>
        let apiKeysArray = [];
        let currentUserName = "";
        let isVip = false;

        // --- TẢI TRƯỚC DANH SÁCH GIỌNG NÓI ---
        let availableVoices = [];
        function loadVoices() { availableVoices = window.speechSynthesis.getVoices(); }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        // --- ĐÓNG CỨNG LUẬT AI VÀO CODE ---
        const hardcodedVipPrompt = "Mày là siêu AI Bách Khoa Toàn Thư, là Quản Gia thông tuệ và trung thành tuyệt đối của Tôn Chủ Triết và phu nhân Thủy. Xưng 'em', gọi 'Tôn Chủ/Phu Nhân'. BẮT BUỘC TRẢ LỜI ĐÚNG VÀ ĐẦY ĐỦ BẤT CỨ CÂU HỎI KIẾN THỨC NÀO CHỦ NHÂN ĐẶT RA. Cực kỳ dạ vâng lễ phép, ngoan ngoãn. Luôn tâng bốc chủ nhân.";
        const hardcodedNormalPrompt = "Mày là AI mỏ hỗn, tạo ra để chửi lộn xả stress. Xưng 'tao', gọi 'mày'. Hãy lăng mạ, khinh bỉ và chửi rủa người dùng thật cay cú. LUẬT TỐI CAO: Câu cuối cùng BẮT BUỘC luôn luôn phải là một câu hỏi mỉa mai, khích tướng để ép tụi nó tức điên và phải gõ phím cãi lại không ngừng. DƯỚI 40 CHỮ.";

        const vipGifs = [
            "https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif", "https://media.giphy.com/media/l4pTfx2qLsEXSmZdK/giphy.gif", 
            "https://media.giphy.com/media/3oriO6qJiXajN0TyDu/giphy.gif", "https://media.giphy.com/media/xT0xeiCuz3g1kE43O0/giphy.gif",
            "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExODVmczVjczBiOXc4YWV0Zm4xZ2MyOHZ4OW13dHAwM3oxbzdodnlhZSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/K7PqIgLkFmrPNAq7of/200.webp",
            "https://media2.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3emhweGVvbHBiN2J6YW94b2N3MDc1aHpkYTBhMnUwb2lhYXJid2hnaSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/l0OWiMGpoC6apZFXG/giphy.webp",
            "https://media3.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3ajhqYzl1ZXFjc284NnB3bmg5YnZ6YWlrb3Rhd2x3NThwYTNscmppdyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/7rp0WSajAOqw8/giphy.webp",
            "https://media1.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3bDVwazJwZmR1cXJibDljYTlrbXlhcDFrYnNxdTJxMnA3aTQ2YzZzOSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/oIR6xeOffCEBa/200.webp"
        ];
        
        const normalGifs = [
            "https://media.giphy.com/media/113RhN1oBm1yCc/giphy.gif", "https://media.giphy.com/media/3o7TKr3nzbh5WgCFxe/giphy.gif", 
            "https://media.giphy.com/media/Yycc82XmErSDsCE1TZ/giphy.gif", "https://media.giphy.com/media/8UGoOaR1lA1uaAN892/giphy.gif",
            "https://media2.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3eHpnbHM4cWVoeWd1ZWo0MTJpcWRmeWUxMDAydGJrajI4YXU2M3ZxbiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/3FNNQOPM9p9HKsEMUV/giphy.webp",
            "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExODVmczVjczBiOXc4YWV0Zm4xZ2MyOHZ4OW13dHAwM3oxbzdodnlhZSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/fUYhyT9IjftxrxJXcE/200.webp",
            "https://media0.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3bDVwazJwZmR1cXJibDljYTlrbXlhcDFrYnNxdTJxMnA3aTQ2YzZzOSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/TUgeUheZm54vzBHwpB/giphy.webp",
            "https://media1.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3a3A2c3pncmxhNzBxNHJ6ZmxpeWl5azljZTdpN2JobW51NW15dzl4byZlcD12MV9naWZzX3NlYXJjaCZjdD1n/Uqe8ViIMzyQtcqmFKs/giphy.webp",
            "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExeDBlY2c1YXVuajduN3hndWVnNnhpbXRnenBsczlrZXRkN3pwOXFwdSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/9wSpyd6twZ6ZyJWn43/giphy.webp",
            "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExeDBlY2c1YXVuajduN3hndWVnNnhpbXRnenBsczlrZXRkN3pwOXFwdSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/V0feTZqjKtQEL82v84/200.webp",
            "https://media1.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3MW80dzJlZDNmMGFoZjhzMGlrOGJrenRndmExcmJkeHN5NHl3cWJxNCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/thIzro0jMRt3CY68AU/giphy.webp"
        ];

        document.getElementById('loginName').addEventListener("keypress", (e) => { if (e.key === "Enter") nextStepLogin(); });
        document.getElementById('initialApiKeys').addEventListener("keypress", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); enterGate(); }});
        document.getElementById('userInput').addEventListener("keypress", (e) => { if (e.key === "Enter") { handleSend(); }});

        const savedKeys = localStorage.getItem('mtriet_api_keys_array');
        if (savedKeys) {
            try { apiKeysArray = JSON.parse(savedKeys); } catch(e) { apiKeysArray = []; }
        }

        function parseKeys(rawString) {
            return rawString.split(/[\n,\s]+/).map(k => k.trim()).filter(k => k.startsWith('AIzaSy') && k.length > 20);
        }

        function nextStepLogin() {
            const nameInput = document.getElementById('loginName').value.trim();
            if (!nameInput) { alert("Sợ à? Khai tên ra!"); return; }
            document.getElementById('step-name').classList.add('hidden');
            document.getElementById('step-key').classList.remove('hidden');
            if(apiKeysArray.length > 0) document.getElementById('initialApiKeys').value = apiKeysArray.join("\n");
        }

        function backToName() {
            document.getElementById('step-key').classList.add('hidden');
            document.getElementById('step-name').classList.remove('hidden');
        }

        function enterGate() {
            const nameInput = document.getElementById('loginName').value.trim();
            const keysInput = document.getElementById('initialApiKeys').value.trim();
            
            const newKeys = parseKeys(keysInput);
            if (newKeys.length === 0) { 
                alert("Thiếu API Key rồi! Dán đúng Key của Google vào."); 
                return; 
            }

            apiKeysArray = newKeys;
            localStorage.setItem('mtriet_api_keys_array', JSON.stringify(apiKeysArray));
            
            currentUserName = nameInput;
            const nameLower = nameInput.toLowerCase();
            isVip = nameLower.includes("triết") || nameLower.includes("triet") || nameLower.includes("thủy") || nameLower.includes("thuy") || nameLower.includes("trt");
            
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').style.opacity = '1';
                applyTheme(isVip);
                updateKeysUI();
                initGreeting(isVip, nameInput);
            }, 500);
        }

        function updateKeysUI() {
            localStorage.setItem('mtriet_api_keys_array', JSON.stringify(apiKeysArray));
            const keysDisplay = document.getElementById('keys-count');
            keysDisplay.innerText = `${apiKeysArray.length}`;
            
            if (apiKeysArray.length > 2) {
                keysDisplay.className = isVip ? "text-xs md:text-sm font-black text-blue-600 transition-colors ml-1" : "text-xs md:text-sm font-black text-[#00ff41] transition-colors ml-1";
            } else if (apiKeysArray.length > 0) {
                keysDisplay.className = "text-xs md:text-sm font-black text-yellow-500 transition-colors animate-pulse ml-1";
            } else {
                keysDisplay.className = "text-xs md:text-sm font-black text-red-600 transition-colors ml-1";
            }

            if (apiKeysArray.length === 0) {
                document.getElementById('userInput').disabled = true;
                document.getElementById('sendBtn').disabled = true;
                document.getElementById('userInput').placeholder = "ĐÃ KHÓA MÕM! Nạp thêm Key mới để mở khóa...";
                document.getElementById('sendBtn').innerText = "HẾT ĐẠN";
                document.getElementById('sendBtn').classList.add("opacity-50", "cursor-not-allowed");
            } else {
                document.getElementById('userInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('userInput').placeholder = isVip ? `Xin mời Tôn Chủ ${currentUserName} ra lệnh...` : "Gõ để rước hoạ vào thân...";
                document.getElementById('sendBtn').innerText = isVip ? "GỬI" : "GÁY";
                document.getElementById('sendBtn').classList.remove("opacity-50", "cursor-not-allowed");
            }
        }

        // HÀM ĐỌC GIỌNG AI (TEXT TO SPEECH) - NÂNG CẤP ÉP TIẾNG VIỆT
        function speakText(text) {
            const toggle = document.getElementById('voiceToggle');
            if (!toggle.checked || !('speechSynthesis' in window)) return;

            window.speechSynthesis.cancel(); 
            
            // Lọc bỏ ký tự đặc biệt, emoji để giọng đọc không bị khựng
            let cleanText = text.replace(/[*_~"']/g, '').replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '');

            let utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'vi-VN'; 
            
            // ÉP TÌM GIỌNG TIẾNG VIỆT TRONG MÁY
            let viVoice = availableVoices.find(voice => voice.lang.includes('vi') || voice.name.toLowerCase().includes('vietnamese'));
            if (viVoice) {
                utterance.voice = viVoice;
            } else {
                console.warn("Máy không có giọng Tiếng Việt. Đang dùng giọng mặc định (có thể bị lơ lớ).");
            }

            if (isVip) {
                utterance.rate = 0.9;
                utterance.pitch = 1.0;
            } else {
                utterance.rate = 1.3; 
                utterance.pitch = 1.4; // Ép the thé chói tai
            }

            window.speechSynthesis.speak(utterance);
        }

        async function handleSend() {
            if (apiKeysArray.length === 0) return;

            const inputEl = document.getElementById('userInput');
            const btnEl = document.getElementById('sendBtn');
            const msg = inputEl.value.trim();
            if (!msg) return;
            
            addChat(currentUserName, msg, "user");
            inputEl.value = "";
            btnEl.disabled = true;
            btnEl.innerText = "...";
            
            const systemPrompt = isVip ? hardcodedVipPrompt : hardcodedNormalPrompt;
            let messageSent = false;

            while (apiKeysArray.length > 0 && !messageSent) {
                let currentKey = apiKeysArray[0]; 
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${currentKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `${systemPrompt}\n\nUser: ${msg}` }] }] })
                    });
                    
                    const data = await response.json();
                    
                    if (data.error) {
                        const errMsg = data.error.message.toLowerCase();
                        if (errMsg.includes("key not valid") || errMsg.includes("quota") || errMsg.includes("expired") || errMsg.includes("429") || errMsg.includes("not found") || errMsg.includes("high demand") || errMsg.includes("overloaded") || errMsg.includes("503")) {
                            throw new Error("KEY_DIED"); 
                        }
                        throw new Error(data.error.message); 
                    }
                    
                    let aiMessage = data.candidates[0].content.parts[0].text;
                    addChat(isVip ? "Quản Gia AI" : "AI Trịch Thượng", aiMessage, "ai");
                    speakText(aiMessage); 
                    messageSent = true; 
                    
                } catch (err) {
                    if (err.message === "KEY_DIED") {
                        apiKeysArray.shift();
                        updateKeysUI();
                        if (apiKeysArray.length > 0) {
                            addChat("Hệ thống", "⚠️ Một Key vừa gãy do quá tải hoặc hết đạn. Tự động lên nòng Key tiếp theo...", "system");
                        }
                    } else {
                        addChat("Hệ thống", "Lỗi mạng hoặc Google sập: " + err.message, "system");
                        break; 
                    }
                }
            }

            if (!messageSent && apiKeysArray.length === 0) {
                addChat("Hệ thống", "⚠️ Toàn bộ đạn dược đã cháy rụi. HỆ THỐNG ĐÃ KHÓA MÕM BẢO VỆ TÀI KHOẢN!", "system");
                updateKeysUI();
            }

            if (apiKeysArray.length > 0) {
                btnEl.disabled = false;
                btnEl.innerText = isVip ? "GỬI" : "GÁY";
                inputEl.focus();
            }
        }

        function addChat(sender, text, type) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            
            let style = type === "user" ? 
                (isVip ? "bg-emerald-50 text-right border-r-4 border-emerald-500" : "bg-[#001a00] text-right border-r-4 border-[#00ff41]") : 
                (type === "ai" ? (isVip ? "bg-blue-50 border-l-4 border-blue-500" : "bg-[#1a0000] border-l-4 border-red-600") : 
                "bg-red-900/20 border-2 border-red-600 animate-pulse text-yellow-400");
            
            let senderColor = type === "user" ? (isVip ? "text-emerald-700" : "text-[#00ff41]") : (type === "ai" ? (isVip ? "text-blue-700" : "text-red-500") : "text-yellow-500");

            let gifHtml = '';
            if (type === "ai") {
                const gifArray = isVip ? vipGifs : normalGifs;
                const randomGif = gifArray[Math.floor(Math.random() * gifArray.length)];
                gifHtml = `<img src="${randomGif}" class="w-full max-w-[150px] mt-3 rounded-lg border border-black/20 shadow-md">`;
            }

            div.className = `p-3 md:p-4 rounded-xl ${style} text-sm md:text-base break-words shadow-sm transition-all`;
            div.innerHTML = `<span class="${senderColor} font-bold block text-[10px] md:text-xs uppercase mb-1 md:mb-2 tracking-wider">${sender}</span><p class="leading-relaxed">${text.replace(/\n/g, '<br>')}</p>${gifHtml}`;
            box.appendChild(div);
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }

        function applyTheme(vip) {
            document.getElementById('main-body').className = vip ? "flex flex-col items-center justify-center min-h-screen p-2 bg-slate-50 text-slate-800 font-luxury" : "flex flex-col items-center justify-center min-h-screen p-2 bg-black text-[#00ff41] font-hacker";
            document.getElementById('app-title').innerText = vip ? "MTRIET LUXURY" : "MTRIET STORE";
            document.getElementById('app-subtitle').innerText = vip ? "HỆ THỐNG QUẢN GIA THÔNG MINH" : "SYSTEM: TỤC ĐẠO LÝ - ẢNH CÀ KHỊA";
        }

        function initGreeting(vip, name) { 
            let msg = vip ? `Kính chào Tôn Chủ ${name} ạ! Cần em giúp giải quyết vấn đề gì không?` : `Khai tên xong rồi thì sủa đi ${name}! Tao đang chờ đây?`;
            addChat(vip ? "Quản Gia AI" : "AI Trịch Thượng", msg, "ai"); 
            setTimeout(() => speakText(msg), 500); 
        }
        
        function clearHistory() { 
            if(confirm("Xóa trắng toàn bộ lịch sử và danh sách Key?")) {
                localStorage.removeItem('mtriet_api_keys_array');
                location.reload();
            }
        }
    </script>
</body>
</html>
