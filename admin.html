<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ADMIN - KHO ĐẠN TỐI CAO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap'); body { font-family: 'Fira Code', monospace; }</style>
</head>
<body class="bg-gray-900 text-gray-200 p-6">
    <div class="max-w-4xl mx-auto bg-black border border-gray-700 rounded-xl p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-4">
            <h1 class="text-2xl font-bold text-red-500">API KEY MANAGER</h1>
            <button id="killSwitchBtn" onclick="toggleKillSwitch()" class="bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-4 rounded transition-all">KHÓA HỆ THỐNG</button>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-gray-800 p-3 rounded border border-gray-700 text-center">
                <p class="text-[10px] text-gray-400">TỔNG KEY</p>
                <p class="text-xl font-bold text-blue-400" id="stat-total">0</p>
            </div>
            <div class="bg-gray-800 p-3 rounded border border-gray-700 text-center">
                <p class="text-[10px] text-gray-400">SẴN SÀNG (ON)</p>
                <p class="text-xl font-bold text-green-400" id="stat-on">0</p>
            </div>
            <div class="bg-gray-800 p-3 rounded border border-gray-700 text-center">
                <p class="text-[10px] text-gray-400">ĐÃ CHÁY (OFF)</p>
                <p class="text-xl font-bold text-red-500" id="stat-dead">0</p>
            </div>
        </div>

        <div class="mb-6 bg-gray-800 p-4 rounded border border-gray-700">
            <h2 class="text-sm font-bold text-blue-400 mb-2">NẠP ĐẠN HÀNG LOẠT (Dán danh sách Key vào đây)</h2>
            <textarea id="bulkKeys" rows="3" placeholder="AIzaSy...&#10;AIzaSy..." class="w-full bg-black border border-gray-600 rounded p-2 text-xs text-white outline-none mb-2 font-mono resize-none"></textarea>
            <button onclick="addBulkKeys()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded text-xs transition-all">LƯU KEY VÀO KHO</button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-800 text-gray-400 text-[10px] uppercase border-b border-gray-700">
                        <th class="p-3">ID</th>
                        <th class="p-3">Mã API Key</th>
                        <th class="p-3 text-center">Trạng thái</th>
                        <th class="p-3 text-center">Xóa</th>
                    </tr>
                </thead>
                <tbody id="keyTableBody" class="text-xs"></tbody>
            </table>
        </div>
        <div class="mt-4 text-center">
            <button onclick="clearAllData()" class="text-[10px] text-gray-600 hover:text-red-500 underline">Xóa sạch toàn bộ dữ liệu hệ thống</button>
        </div>
    </div>

    <script>
        // Data base siêu gọn, chỉ chứa danh sách Key và công tắc Khóa hệ thống
        let db = JSON.parse(localStorage.getItem('mtriet_db')) || { keys: [], killSwitch: false };

        function saveDB() { localStorage.setItem('mtriet_db', JSON.stringify(db)); renderAdmin(); }

        function addBulkKeys() {
            const raw = document.getElementById('bulkKeys').value.trim();
            if(!raw) return;
            const newKeys = raw.split(/[\n,\s]+/).filter(k => k.startsWith('AIzaSy'));
            let added = 0;
            newKeys.forEach(k => {
                if(!db.keys.find(exist => exist.key === k)) {
                    db.keys.push({ id: Date.now() + Math.random(), key: k, active: true, dead: false });
                    added++;
                }
            });
            document.getElementById('bulkKeys').value = '';
            saveDB();
            alert(`Đã nạp thêm ${added} Key mới!`);
        }

        function toggleKillSwitch() { db.killSwitch = !db.killSwitch; saveDB(); }
        function deleteKey(id) { db.keys = db.keys.filter(k => k.id !== id); saveDB(); }
        function clearAllData() { if(confirm("Xóa hết dữ liệu và làm lại từ đầu?")) { localStorage.clear(); location.reload(); } }

        function renderAdmin() {
            const btn = document.getElementById('killSwitchBtn');
            btn.innerText = db.killSwitch ? "MỞ LẠI HỆ THỐNG" : "KHÓA HỆ THỐNG";
            btn.className = db.killSwitch ? "bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-4 rounded" : "bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-4 rounded";

            document.getElementById('stat-total').innerText = db.keys.length;
            document.getElementById('stat-on').innerText = db.keys.filter(k => k.active && !k.dead).length;
            document.getElementById('stat-dead').innerText = db.keys.filter(k => k.dead).length;

            const tbody = document.getElementById('keyTableBody');
            tbody.innerHTML = '';
            db.keys.forEach((k, index) => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-800 hover:bg-gray-800 transition-colors";
                tr.innerHTML = `
                    <td class="p-3 text-gray-500">Key ${index + 1}</td>
                    <td class="p-3 font-mono ${k.dead ? 'text-gray-600 line-through' : 'text-blue-300'}">${k.key.substring(0, 18)}...</td>
                    <td class="p-3 text-center">
                        <span class="px-2 py-1 rounded text-[10px] font-bold ${k.dead ? 'bg-red-900/50 text-red-500' : 'bg-green-900/50 text-green-500'}">
                            ${k.dead ? 'ĐÃ CHÁY (OFF)' : 'SẴN SÀNG (ON)'}
                        </span>
                    </td>
                    <td class="p-3 text-center"><button onclick="deleteKey(${k.id})" class="text-gray-500 hover:text-red-500 font-bold">X</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Tự quét lại dữ liệu để cập nhật nếu bên trang chat đánh sập Key
        setInterval(() => { 
            const freshDb = JSON.parse(localStorage.getItem('mtriet_db'));
            if(freshDb && JSON.stringify(freshDb) !== JSON.stringify(db)) {
                db = freshDb;
                renderAdmin();
            }
        }, 1500);
        
        renderAdmin();
    </script>
</body>
</html>
